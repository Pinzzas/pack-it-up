<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route 1 Family</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- ── Title Screen ──────────────────────────────────────── -->
    <section id="screen-title" class="screen">
      <div class="title-card">
        <div class="title-route">Manila → Batangas</div>
        <h1 class="title-name">Route 1<br>Family</h1>
        <p class="title-tagline">
          You can't control everything.<br>
          That's where the memories come from.
        </p>
        <button id="btn-start" class="btn-primary">Pack Your Bag</button>
      </div>
    </section>

    <!-- ── Pack Screen (Phase 2) ─────────────────────────────── -->
    <section id="screen-pack" class="screen hidden">
      <p class="placeholder-text">Packing screen — coming in Phase 2.</p>
    </section>

    <!-- ── Drive Screen (Phase 3) ────────────────────────────── -->
    <section id="screen-drive" class="screen hidden">
      <p class="placeholder-text">Drive screen — coming in Phase 3.</p>
    </section>

    <!-- ── Journal Screen (Phase 5) ─────────────────────────── -->
    <section id="screen-journal" class="screen hidden">
      <p class="placeholder-text">Journal screen — coming in Phase 5.</p>
    </section>

  </div>

  <script type="module" src="src/state.js"></script>

</html>
