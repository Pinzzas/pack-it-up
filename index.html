<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route 1 Family</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- ── Title Screen ──────────────────────────────────────── -->
    <section id="screen-title" class="screen">
      <div class="title-card">
        <div class="title-route">Manila → Batangas</div>
        <h1 class="title-name">Route 1<br>Family</h1>
        <p class="title-tagline">
          You can't control everything.<br>
          That's where the memories come from.
        </p>
        <button id="btn-start" class="btn-primary">Pack Your Bag</button>
      </div>
    </section>

    <!-- ── Pack Screen ─────────────────────────────────────── -->
    <section id="screen-pack" class="screen hidden">
      <div class="pack-layout">
        <header class="pack-header">
          <h2 class="pack-title">Pack Your Bag</h2>
          <p class="pack-route">Manila → Batangas · 8 events ahead</p>
        </header>
        <div class="pack-main">
          <div class="pack-grid-area">
            <div id="pack-grid" class="pack-grid"></div>
            <p class="pack-hint">Drag items onto the grid · Click a packed item to rotate it</p>
          </div>
          <div class="pack-tray-area">
            <h3 class="tray-title">Items</h3>
            <div id="item-tray" class="item-tray"></div>
          </div>
        </div>
        <footer class="pack-footer">
          <button id="btn-start-trip" class="btn-primary" disabled>Start Trip →</button>
        </footer>
      </div>
    </section>

    <!-- ── Drive Screen (Phase 3) ────────────────────────────── -->
    <section id="screen-drive" class="screen hidden">
      <p class="placeholder-text">Drive screen — coming in Phase 3.</p>
    </section>

    <!-- ── Journal Screen (Phase 5) ─────────────────────────── -->
    <section id="screen-journal" class="screen hidden">
      <p class="placeholder-text">Journal screen — coming in Phase 5.</p>
    </section>

  </div>

  <script type="module" src="src/state.js"></script>
</body>
</html>
